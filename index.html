<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Candidature Staff - enewfa</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="header-title">Candidature enewfa</div>

  <!-- 🔥 Bouton Admin en haut -->
  <button class="admin-btn-top" onclick="openAdmin()">Admin</button>
</header>

<div class="container">

  <h1 class="title">Bienvenue sur le système de candidature de <span>enewfa</span></h1>

  <!-- PAGE 1 -->
<div id="step1" class="card step">
  <h2>Présentation IRL</h2>

  <div class="inputs">
    <label>Présentation IRL</label>
    <textarea id="irl" placeholder="Présente-toi brièvement IRL"></textarea>

    <label>Prénom</label>
    <input id="prenom" type="text" placeholder="Ex : Lucas">

    <label>Âge</label>
    <input id="age" type="number" placeholder="Ex : 18">

    <label>Pseudo Discord</label>
    <input id="discord" type="text" placeholder="Ex : Sacha#0001">

    <label>ID Discord</label>
    <input id="discordId" type="text" placeholder="Ex : 283910293810293">

    <label>Disponibilités</label>
    <textarea id="dispos" placeholder="Ex : Semaine 18h-23h / WE libre"></textarea>
  </div>

  <button class="btn-next" onclick="nextStep()">Suivant ➜</button>
</div>


<!-- PAGE 2 -->
<div id="step2" class="card step" style="display:none;">
  <h2>Administration</h2>

  <div class="inputs">

    <label>Poste souhaité</label>
    <select id="poste" onchange="toggleAutrePoste()">
      <option value="">— Sélectionnez un poste —</option>
      <option value="Helpeur">Helpeur</option>
      <option value="Modérateur">Modérateur</option>
      <option value="Gérant Staff">Gérant Staff</option>
      <option value="Gérant Légal">Gérant Légal</option>
      <option value="Gérant Illégal">Gérant Illégal</option>
      <option value="Gérant Global">Gérant Global</option>
      <option value="Autre">Autre</option>
    </select>
        
    <!-- Champ affiché seulement si "Autre" -->
    <div id="autrePosteBox" style="display:none;">
      <label>Précisez le poste</label>
      <input id="autrePoste" type="text" placeholder="Ex : Développeur, Graphiste...">
    </div>

      <label>Motivations</label>
      <textarea id="motivations"></textarea>

      <label>Pourquoi vous ?</label>
      <textarea id="why"></textarea>

      <label>Qualités</label>
      <textarea id="qualites"></textarea>

      <label>Qu'est ce qu'un Modérateur / Community Manager</label>
      <textarea id="definition"></textarea>

      <label>Expérience</label>
      <textarea id="experience"></textarea>

      <label>Ajouts</label>
      <textarea id="extra"></textarea>
    </div>

    <div class="btn-row">
      <button class="btn-back" onclick="prevStep()">⬅ Retour</button>
      <button class="btn-send" onclick="sendForm()">Envoyer 🚀</button>
    </div>

    <p id="status" class="status"></p>
  </div>

  <!-- PANEL ADMIN ✔ tout en bas -->
  <div id="adminPanel"></div>

</div>

<script src="script.js"></script>
</body>
</html>
